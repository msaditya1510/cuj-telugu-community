spring.application.name=cuj-telugu

# Database configuration (values injected from environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Admin bootstrap configuration
app.admin.username=${ADMIN_USERNAME}
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# Hibernate production safety
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Logging
logging.level.org.springframework=INFO
logging.level.com.telugu.cuj=INFO

# Disable SQL printing in production
spring.jpa.show-sql=false

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true